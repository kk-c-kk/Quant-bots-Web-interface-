# nginx reverse proxy + HTTP basic auth in front of the (deliberately
# unauthenticated) reporter dashboard. nginx becomes the ONLY public door:
# the reporter itself binds 127.0.0.1:8000 and is unreachable from the internet.
#
# Install: see deploy/REVERSE_PROXY.md. After copying this file and replacing
# YOURNAME.duckdns.org below, run:
#     sudo certbot --nginx -d YOURNAME.duckdns.org
# certbot adds the TLS (443) server block + the HTTP->HTTPS redirect in place,
# preserving the auth_basic settings. Do not re-copy this file over the live
# one afterwards (it would drop the TLS block); re-run certbot --nginx if you do.

server {
    listen 80;
    listen [::]:80;
    server_name YOURNAME.duckdns.org;   # <-- replace with your DuckDNS host

    # password gate for everything, including /api/* (real bots POST to
    # 127.0.0.1:8000 directly and never traverse nginx, so they're unaffected).
    location / {
        auth_basic           "Quant Terminal";
        auth_basic_user_file /etc/nginx/.htpasswd-quant;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
